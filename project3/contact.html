<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css">
    <title>Storytime Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Average+Sans&family=Cantarell:ital,wght@0,400;0,700;1,400;1,700&family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
</head>

<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <nav id="navigation">
        <ul>
            <li><a href="guide.html">Home Page</a></li>
            <li><a href="resources.html">Additional Resources</a></li>
            <li><a href="contact.html">Questions?</a></li>
        </ul>
    </nav>
    <form action="submit.html" method="post">
        <div class="container">
            <div class="field">
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" size="50" required>
            </div>
            <div class="field">
                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" required>
            </div>
            <div class="field">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="field">
                <label for="questions">What would you like to learn more about?</label>
                <textarea id="questions" name="questions" placeholder="Enter your story time questions here!"
                    required></textarea>
            </div>
            <div class="form-actions">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </div>
    </form>
    </nav>

</body
